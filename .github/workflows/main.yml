name: First Workflow

on:
    push:
        branches: [ main ]

jobs:
    build:
        if: contains(github.event.head_commit.message, '[[deploy]]')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2
            - name: Run a one-line script
              run: echo Hello, world!
            # start npm run test then dev
            - name: npm run test
              run: npm run test
            - name: npm run dev
              run: npm run dev
